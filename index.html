<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutureCheck - Task Management</title>
    <style>
        :root {
            --bg-color: #0a0b10;
            --glass-bg: rgba(20, 25, 40, 0.7);
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --text-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #1a1b2e 0%, var(--bg-color) 100%);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        /* Gläserne Panels */
        .panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-blue);
            border-bottom: 1px solid var(--neon-blue);
            padding-bottom: 10px;
        }

        /* Formular-Elemente */
        input, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            outline: none;
            box-sizing: border-box;
        }

        input {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px rgba(188, 19, 254, 0.3);
        }

        button {
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            color: white;
        }

        .btn-primary:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        /* Checklisten-Anzeige */
        .task-list {
            list-style: none;
            padding: 0;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 3px solid var(--neon-blue);
        }

        .task-item.done {
            opacity: 0.5;
            text-decoration: line-through;
            border-left-color: #555;
        }

        /* Archiv-Bereich */
        .archive-item {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .meta-info {
            font-size: 0.8rem;
            color: var(--neon-purple);
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- LINKES MENÜ: Erstellung -->
    <div class="panel">
        <h2>System Input</h2>
        <input type="text" id="listName" placeholder="Name der Checkliste...">
        <input type="text" id="taskInput" placeholder="Neue Aufgabe...">
        <button class="btn-primary" onclick="addTask()">Hinzufügen</button>
        <hr style="border: 0.5px solid rgba(255,255,255,0.1); margin: 20px 0;">
        <button class="btn-primary" style="background: var(--neon-purple);" onclick="saveChecklist()">Liste Speichern</button>
    </div>

    <!-- RECHTES PANEL: Aktive Bearbeitung & Archiv -->
    <div class="panel">
        <h2>Aktive Matrix</h2>
        <div id="currentListName" style="font-weight: bold; margin-bottom: 10px; color: var(--neon-blue);">Unbenannte Liste</div>
        <ul id="activeTasks" class="task-list">
            <!-- Aufgaben erscheinen hier -->
        </ul>

        <h2 style="margin-top: 40px;">Daten-Archiv</h2>
        <div id="savedLists">
            <!-- Gespeicherte Listen erscheinen hier -->
        </div>
    </div>
</div>

<script>
    let currentTasks = [];

    function addTask() {
        const input = document.getElementById('taskInput');
        if (input.value.trim() === "") return;

        currentTasks.push({ text: input.value, done: false });
        input.value = "";
        renderTasks();
    }

    function toggleTask(index) {
        currentTasks[index].done = !currentTasks[index].done;
        renderTasks();
    }

    function renderTasks() {
        const listName = document.getElementById('listName').value || "Unbenannte Liste";
        document.getElementById('currentListName').innerText = listName;
        
        const listElement = document.getElementById('activeTasks');
        listElement.innerHTML = "";

        currentTasks.forEach((task, index) => {
            const li = document.createElement('li');
            li.className = `task-item ${task.done ? 'done' : ''}`;
            li.innerHTML = `
                <span>${task.text}</span>
                <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask(${index})" style="width: 20px; margin: 0;">
            `;
            listElement.appendChild(li);
        });
    }

    function saveChecklist() {
        const name = document.getElementById('listName').value;
        if (!name || currentTasks.length === 0) {
            alert("Bitte Namen eingeben und mindestens eine Aufgabe hinzufügen!");
            return;
        }

        const date = new Date().toLocaleString('de-DE');
        const savedContainer = document.getElementById('savedLists');

        const archiveEntry = document.createElement('div');
        archiveEntry.className = 'archive-item';
        
        let tasksHtml = currentTasks.map(t => `<li>${t.done ? '✓' : '○'} ${t.text}</li>`).join('');

        archiveEntry.innerHTML = `
            <div class="meta-info">LOG: ${date} | USER: ${name}</div>
            <strong style="color: white;">${name}</strong>
            <ul style="font-size: 0.9rem; margin-top: 10px; padding-left: 20px; color: #aaa;">${tasksHtml}</ul>
        `;

        savedContainer.prepend(archiveEntry);

        // Reset für neue Liste
        currentTasks = [];
        document.getElementById('listName').value = "";
        renderTasks();
    }
</script>

</body>
</html>
