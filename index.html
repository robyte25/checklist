<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FutureCheck Mobile</title>
    <style>
        :root {
            --bg-color: #050608;
            --glass: rgba(25, 30, 45, 0.8);
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --text: #ffffff;
            --nav-height: 65px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Viewport Management */
        .content-area {
            flex: 1;
            padding: 20px;
            padding-bottom: calc(var(--nav-height) + 20px);
            overflow-y: auto;
        }

        .view {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* UI Elemente */
        h2 {
            font-size: 1.4rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        .input-group {
            background: var(--glass);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--neon-purple);
            border-radius: 10px;
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
            font-size: 16px; /* Verhindert Zoom auf iOS/Android */
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        .btn-main {
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            color: white;
            box-shadow: 0 4px 15px rgba(188, 19, 254, 0.3);
        }

        /* Task Liste */
        .task-item {
            background: var(--glass);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 4px solid var(--neon-blue);
        }

        .task-item.done {
            border-left-color: #444;
            opacity: 0.6;
        }

        /* Navigation Bar */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: var(--nav-height);
            background: rgba(10, 12, 18, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .nav-item {
            color: #666;
            text-decoration: none;
            font-size: 0.7rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .nav-item.active {
            color: var(--neon-blue);
        }

        .nav-icon {
            font-size: 1.5rem;
            margin-bottom: 4px;
        }

        /* Archiv */
        .archive-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(0, 242, 255, 0.1);
        }

        .timestamp {
            font-size: 0.7rem;
            color: var(--neon-purple);
        }
    </style>
</head>
<body>

<div class="content-area">
    <!-- VIEW 1: Erstellen -->
    <div id="view-create" class="view active">
        <h2>Input Center</h2>
        <div class="input-group">
            <input type="text" id="listName" placeholder="Name der Liste...">
            <input type="text" id="taskInput" placeholder="Aufgabe hinzufügen...">
            <button class="btn-main" onclick="addTask()">Hinzufügen</button>
        </div>
        <button onclick="saveChecklist()" style="background: transparent; color: var(--neon-purple); border: 1px solid var(--neon-purple);">
            Liste Finalisieren & Speichern
        </button>
    </div>

    <!-- VIEW 2: Aktuelle Liste -->
    <div id="view-active" class="view">
        <h2 id="displayTitle">Aktive Matrix</h2>
        <div id="taskList" class="task-list">
            <!-- Tasks per JS -->
        </div>
    </div>

    <!-- VIEW 3: Archiv -->
    <div id="view-archive" class="view">
        <h2>Daten Archiv</h2>
        <div id="archiveList">
            <!-- Gespeicherte Listen per JS -->
        </div>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="switchView('view-create', this)">
        <span class="nav-icon">＋</span>
        <span>NEU</span>
    </div>
    <div class="nav-item" onclick="switchView('view-active', this)">
        <span class="nav-icon">☰</span>
        <span>LISTE</span>
    </div>
    <div class="nav-item" onclick="switchView('view-archive', this)">
        <span class="nav-icon">💾</span>
        <span>ARCHIV</span>
    </div>
</nav>

<script>
    let currentTasks = [];

    function switchView(viewId, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function addTask() {
        const tInput = document.getElementById('taskInput');
        const lName = document.getElementById('listName').value || "Unbenannt";
        
        if(tInput.value.trim() === "") return;

        currentTasks.push({ text: tInput.value, done: false });
        tInput.value = "";
        document.getElementById('displayTitle').innerText = lName;
        renderTasks();
    }

    function toggleTask(index) {
        currentTasks[index].done = !currentTasks[index].done;
        renderTasks();
    }

    function renderTasks() {
        const container = document.getElementById('taskList');
        container.innerHTML = "";
        currentTasks.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = `task-item ${t.done ? 'done' : ''}`;
            div.onclick = () => toggleTask(i);
            div.innerHTML = `
                <span>${t.text}</span>
                <span>${t.done ? '●' : '○'}</span>
            `;
            container.appendChild(div);
        });
    }

    function saveChecklist() {
        const name = document.getElementById('listName').value || "Backup_" + Date.now();
        if(currentTasks.length === 0) return;

        const date = new Date().toLocaleDateString('de-DE', {hour: '2-digit', minute:'2-digit'});
        const archive = document.getElementById('archiveList');
        
        const card = document.createElement('div');
        card.className = 'archive-card';
        card.innerHTML = `
            <div class="timestamp">${date} | ${name}</div>
            <div style="margin-top:5px; font-weight:bold;">${currentTasks.length} Aufgaben gespeichert</div>
        `;
        
        archive.prepend(card);
        
        // Reset
        currentTasks = [];
        document.getElementById('listName').value = "";
        renderTasks();
        alert("Daten im Kernspeicher abgelegt.");
        switchView('view-archive', document.querySelectorAll('.nav-item')[2]);
    }
</script>

</body>
</html>
