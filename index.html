<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FutureCheck Pro</title>
    <style>
        :root {
            --bg: #050608;
            --glass: rgba(25, 30, 45, 0.9);
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --text: #ffffff;
            --nav-h: 70px;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .content {
            flex: 1;
            padding: 20px;
            padding-bottom: 90px;
            overflow-y: auto;
        }

        .view { display: none; animation: slide 0.3s ease-out; }
        .view.active { display: block; }

        @keyframes slide {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        h2 { color: var(--neon-blue); text-transform: uppercase; border-left: 4px solid var(--neon-purple); padding-left: 10px; }

        /* Eingabe-Bereich */
        .input-card {
            background: var(--glass);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
            color: white;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .task-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        /* Buttons */
        .btn {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-plus { background: var(--neon-blue); color: black; width: 50px; font-size: 1.5rem; }
        .btn-save { background: var(--neon-purple); color: white; width: 100%; margin-top: 10px; }
        
        .list-btn {
            width: 100%;
            background: rgba(255,255,255,0.05);
            color: white;
            text-align: left;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid var(--neon-blue);
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Task Item */
        .task-display {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 5px;
            border-left: 3px solid var(--neon-purple);
        }

        /* Navigation */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: var(--nav-h);
            background: #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--neon-blue);
        }

        .nav-item { color: #555; font-size: 0.8rem; text-align: center; }
        .nav-item.active { color: var(--neon-blue); }
    </style>
</head>
<body>

<div class="content">
    <!-- VIEW: Home / Archiv -->
    <div id="view-home" class="view active">
        <h2>Meine Protokolle</h2>
        <div id="archive-container">
            <!-- Listen werden hier als Buttons generiert -->
        </div>
    </div>

    <!-- VIEW: Editor -->
    <div id="view-editor" class="view">
        <h2>Neues Protokoll</h2>
        <div class="input-card">
            <input type="text" id="main-title" placeholder="Name der Liste (z.B. Inventar)">
            <div id="dynamic-tasks">
                <!-- Hier erscheinen die hinzugefügten Aufgaben-Felder -->
            </div>
            <div class="task-row">
                <input type="text" id="new-task-input" placeholder="Aufgabe eingeben...">
                <button class="btn btn-plus" onclick="addTaskToTemp()">+</button>
            </div>
            <button class="btn btn-save" onclick="finalizeAndSave()">Protokoll Speichern</button>
        </div>
    </div>

    <!-- VIEW: Detailansicht -->
    <div id="view-detail" class="view">
        <button onclick="switchView('view-home')" style="background:none; color:var(--neon-blue); border:none; margin-bottom:10px;">← Zurück</button>
        <h2 id="detail-title">Details</h2>
        <div id="detail-list"></div>
    </div>
</div>

<nav>
    <div class="nav-item active" id="nav-home" onclick="switchView('view-home')">
        <div style="font-size: 1.5rem;">📁</div>
        ARCHIV
    </div>
    <div class="nav-item" id="nav-editor" onclick="switchView('view-editor')">
        <div style="font-size: 1.5rem;">＋</div>
        LISTE HINZUFÜGEN
    </div>
</nav>

<script>
    let tempTasks = [];
    let savedLists = [];

    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(viewId === 'view-home') document.getElementById('nav-home').classList.add('active');
        if(viewId === 'view-editor') document.getElementById('nav-editor').classList.add('active');
    }

    // Fügt eine Aufgabe zur aktuellen (noch nicht gespeicherten) Liste hinzu
    function addTaskToTemp() {
        const input = document.getElementById('new-task-input');
        if(input.value.trim() === "") return;

        tempTasks.push(input.value);
        
        const container = document.getElementById('dynamic-tasks');
        const div = document.createElement('div');
        div.className = 'task-display';
        div.innerText = input.value;
        container.appendChild(div);

        input.value = "";
    }

    // Speichert die gesamte Liste im Archiv
    function finalizeAndSave() {
        const title = document.getElementById('main-title').value || "Unbenanntes Protokoll";
        if(tempTasks.length === 0) {
            alert("Die Liste ist leer!");
            return;
        }

        const listObject = {
            id: Date.now(),
            title: title,
            date: new Date().toLocaleString('de-DE'),
            tasks: [...tempTasks]
        };

        savedLists.push(listObject);
        renderArchive();
        
        // Reset Editor
        tempTasks = [];
        document.getElementById('main-title').value = "";
        document.getElementById('dynamic-tasks').innerHTML = "";
        
        switchView('view-home');
    }

    function renderArchive() {
        const container = document.getElementById('archive-container');
        container.innerHTML = "";

        savedLists.forEach(list => {
            const btn = document.createElement('button');
            btn.className = 'list-btn';
            btn.onclick = () => showDetail(list.id);
            btn.innerHTML = `
                <div>
                    <strong>${list.title}</strong><br>
                    <small style="color:var(--neon-purple)">${list.date}</small>
                </div>
                <span>➔</span>
            `;
            container.prepend(btn);
        });
    }

    function showDetail(id) {
        const list = savedLists.find(l => l.id === id);
        document.getElementById('detail-title').innerText = list.title;
        const container = document.getElementById('detail-list');
        container.innerHTML = "";

        list.tasks.forEach(t => {
            const div = document.createElement('div');
            div.className = 'task-display';
            div.innerText = t;
            container.appendChild(div);
        });

        switchView('view-detail');
    }
</script>

</body>
</html>
